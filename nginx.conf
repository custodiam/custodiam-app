server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # Universal Links iOS: fichero sin extensión que Apple exige servir como
    # application/json. Sin esta location, Nginx lo serviría como
    # application/octet-stream y caería al fallback SPA en caso de error,
    # devolviendo HTML en lugar del JSON.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    # App Links Android: aunque .json ya resuelve MIME por mime.types, fijamos
    # la location explícita para que en ningún caso caiga al fallback SPA.
    location = /.well-known/assetlinks.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=3600";
    }

    # Flutter Web bootstrap files: cache corto + must-revalidate.
    # Estos archivos tienen URL estable pero se reemplazan en cada deploy.
    # Cachearlos a largo plazo con `immutable` hace que CDNs y navegadores
    # sirvan un bundle obsoleto hasta purga manual. El Service Worker de
    # Flutter que históricamente compensaba esto ha sido deprecado
    # (https://github.com/flutter/flutter/issues/156910), trasladando 100%
    # la responsabilidad de invalidar el bundle al operador del servidor
    # estático y del CDN. Incidente operativo documentado en
    # docs/tfg/memoria/lecciones/2026-05-26-flutter-web-cache-busting.md.
    location ~* ^/(index\.html|main\.dart\.js|flutter(?:_bootstrap|_service_worker)?\.js|manifest\.json|version\.json|\.last_build_id)$ {
        add_header Cache-Control "public, no-cache, must-revalidate" always;
        etag on;
    }

    # Assets con fingerprint: cache largo immutable.
    # /canvaskit/ y /assets/ contienen binarios cuyo path o nombre incluye
    # un hash de revisión (ver AssetManifest.bin del bundle Flutter), por
    # lo que un cambio de contenido implica un cambio de URL y la entrada
    # antigua queda naturalmente sin referenciar al regenerar el bundle.
    location ^~ /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location ^~ /icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Fuentes, imágenes y hojas de estilo que no caen bajo las rutas
    # /canvaskit/, /assets/ o /icons/. Tratamos también como cacheables
    # a largo plazo: o llevan hash en el nombre o son estables en el
    # tiempo (favicon, manifest icons del centro).
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # SPA fallback: cualquier ruta desconocida sirve index.html. Aplicamos
    # la misma política de cache corto que al propio index.html para que
    # un deep-link recargado tras un deploy nuevo no quede atrapado en
    # caché con la versión antigua.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, no-cache, must-revalidate" always;
    }
}
