name: custodiam
description: App de gestión para agrupaciones de Protección Civil.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^17.1.0

  # HTTP (paquete oficial Dart - decisión ADR en 03_ARQUITECTURA)
  http: ^1.2.0

  # Auth
  flutter_appauth: ^11.0.0
  flutter_secure_storage: ^10.0.0

  # Serialización
  json_annotation: ^4.9.0

  # UI
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Offline (Sprint 9 - se añadirá cuando toque)
  # sqflite: ^2.4.0
  # connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  json_serializable: ^6.8.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  # Localización
  generate: true
