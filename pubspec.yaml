name: custodiam
description: App de gestión para agrupaciones de Protección Civil.
publish_to: 'none'
version: 0.1.0+7

environment:
  # Subido de ^3.6.0 a ^3.8.0 requerido por patrol 4.x (EN-08-35). El equipo
  # ya está en Dart 3.11.5; el bump es declarativo. ADR-024.
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^17.1.0

  # HTTP (paquete oficial Dart - decisión ADR en 03_ARQUITECTURA)
  http: ^1.2.0

  # State management (ADR-012)
  flutter_riverpod: ^2.6.0

  # Auth (OIDC con Keycloak — EN-01-02)
  oauth2: ^2.0.3
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.1
  app_links: ^6.3.3

  # Web APIs binding (sessionStorage para code_verifier PKCE en SPA — EN-08-34 / ADR-023)
  web: ^1.1.0

  # Estrategia de URL en Flutter Web (PathUrlStrategy en lugar de la
  # HashUrlStrategy por defecto, requisito para que GoRouter matchee
  # /callback cuando Keycloak redirige — EN-08-34 capa 3). En plataformas
  # no-web el paquete carga stubs no-op.
  flutter_web_plugins:
    sdk: flutter

  # Preferencias locales (feature settings — EN-08-25)
  shared_preferences: ^2.5.4

  # Serialización
  json_annotation: ^4.9.0

  # UI
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Material Symbols icon set, accessed via `Symbols.*` (outlined is the
  # default, no suffix; `_rounded` / `_sharp` for the other styles). The
  # whole app uses this set; the fill/weight axes drive states such as
  # selected nav items. Font subsetting via Flutter's --tree-shake-icons
  # (release default) keeps the bundle tight: only the glyphs actually
  # used ship with the APK / web build.
  material_symbols_icons: ^4.2928.1
  firebase_core: ^4.9.0
  # EN-06-02: cliente FCM en el cliente Flutter. Major sincronizado con
  # firebase_core (4.x → firebase_messaging 16.x). Las API key
  # restringidas por aplicación + API ya quedaron configuradas en Cloud
  # Console como parte de EN-08-19 (guía 13 §5).
  firebase_messaging: ^16.0.0

  # Geolocalización y mapas (ADR-030, stack diferenciado por plataforma):
  # - google_maps_flutter: mapa interactivo en móvil (Maps SDK Android/iOS,
  #   free tier; key restringida por package/bundle vía sops).
  # - flutter_map + latlong2: mapa interactivo en web con tiles CARTO
  #   (sin key, sin billing). Conditional import: nunca conviven en runtime.
  # - geolocator: posición actual del usuario (móvil + web).
  # - geocoding: reverse-geocoding nativo del SO en móvil (web usa Nominatim).
  google_maps_flutter: ^2.17.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  # Notificaciones locales: pinta el heads-up con sonido cuando llega un
  # push con la app en PRIMER PLANO (FCM no lo hace solo en foreground en
  # Android). Solo se usa en Android; en iOS el banner foreground lo
  # muestra el sistema vía setForegroundNotificationPresentationOptions.
  # Requiere core library desugaring en android/app/build.gradle.kts
  # (usa java.time y el minSdk del proyecto es 24).
  flutter_local_notifications: ^21.0.0

  # Versión del build mostrada de forma discreta en Ajustes.
  package_info_plus: ^10.1.0

  # Offline (Sprint 9 - se añadirá cuando toque)
  # sqflite: ^2.4.0
  # connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  json_serializable: ^6.8.0
  build_runner: ^2.4.0

  # Testing E2E unificado mobile + web vía Playwright (EN-08-35 / ADR-024).
  # patrol_cli se instala globalmente: dart pub global activate patrol_cli.
  patrol: ^4.6.0
  patrol_finders: ^3.4.0

  # Branding: generadores de icono de launcher y de splash nativo. Se
  # ejecutan a demanda (no en cada build); regeneran archivos en
  # android/, ios/ y web/ cuando el logo o la paleta cambien:
  #   dart run flutter_launcher_icons
  #   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  # Localización
  generate: true

  assets:
    - assets/

# Icono de launcher generado a partir de assets/logo.png (1024×1024 con
# alfa). Para iOS el alfa se elimina rellenando con el color brand para
# cumplir con la regla de App Store. Para Android se usa adaptive icon
# con foreground = logo y background = color brand.
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#FF6600"
    theme_color: "#FF6600"
  image_path: "assets/logo.png"
  adaptive_icon_foreground: "assets/logo.png"
  adaptive_icon_background: "#FF6600"
  remove_alpha_ios: true
  background_color_ios: "#FF6600"

# Splash nativo: solo color de fondo, sin imagen. La pantalla con el
# logo es la SplashPage custom de Flutter (features/splash) que toma el
# relevo en cuanto el motor de Flutter arranca. Mantener el splash
# nativo vacío evita el "doble logo" entre el splash del SO y el de
# Flutter, y respeta las limitaciones que cada SO impone a la
# personalización del splash nativo.
#
# Android 12+ obliga a mostrar un icono centrado en el splash del SO
# (windowSplashScreenAnimatedIcon); si no se le indica ninguno, cae al
# icono del launcher. Para conservar el splash nativo "solo color" se le
# pasa una imagen 100% transparente (assets/splash_transparent.png), que
# anula ese icono forzado sin dibujar nada encima del naranja.
flutter_native_splash:
  color: "#FF6600"
  android: true
  ios: true
  web: false
  android_12:
    color: "#FF6600"
    image: assets/splash_transparent.png
