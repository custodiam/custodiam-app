<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Custodiam — App de gestión para agrupaciones de Protección Civil.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Custodiam">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Custodiam</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    DIAGNOSTIC ONLY (issue #40): unregister every Service Worker at boot to
    verify whether stray SWs (Flutter's deprecated `flutter_service_worker.js`
    auto-emitted by `flutter build web`, and our `firebase-messaging-sw.js`)
    are what makes Playwright's cleanup hang in CI headless runs.
    Reverting this block restores the original behavior. Do not promote to
    production without conditional gating on a release build flag.
  -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
