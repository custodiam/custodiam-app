name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    # Ampliado a `develop` para que el job `patrol-web` (EN-08-35) proteja
    # las PRs antes del merge a `develop`, no solo las promociones a
    # `main`. La PR de promoción `develop -> main` sigue cubierta porque
    # `main` está en la lista.
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Build Web
        run: flutter build web

  patrol-web:
    # DIAGNOSTIC MATRIX (issue #40, retomada bias-correction): repeat the
    # 3 runner-OS variants whose first attempt was invalidated by setup
    # errors of mine (windows-latest exit 127 due to PATH; debian container
    # "No devices attached" due to missing chromium binary). Each variant
    # under `continue-on-error: true` and `fail-fast: false` so all of them
    # produce a datapoint regardless of others' outcome. DO NOT MERGE this
    # branch — it exists solely to gather statistical evidence (>= 3 runs
    # per configuration) on the intermittent patrol-web bug.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Activate patrol_cli + propagate PATH
        # CRITICAL: on Windows runner Git Bash does NOT inherit the global
        # PATH updated by `dart pub global activate`. We must add the
        # pub-cache bin explicitly to $GITHUB_PATH so subsequent steps
        # can find `patrol`. Without this: `patrol doctor` exit code 127.
        shell: bash
        run: |
          dart pub global activate patrol_cli
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "$LOCALAPPDATA/Pub/Cache/bin" >> "$GITHUB_PATH"
          else
            echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          fi

      - name: Install Flutter dependencies
        shell: bash
        run: flutter pub get

      - name: Install Playwright Chromium system libs (Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: sudo npx --yes playwright@latest install-deps chromium

      - name: Patrol doctor
        shell: bash
        run: patrol doctor

      - name: Run Patrol web tests
        shell: bash
        run: |
          patrol test \
            --target patrol_test/web/ \
            --device chrome \
            --web-headless=true \
            --web-locale=es-ES \
            --web-timezone=Europe/Madrid \
            --web-browser-args='["--no-sandbox", "--disable-dev-shm-usage"]'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  patrol-web-debian:
    # DIAGNOSTIC (issue #40, retomada bias-correction): exercise patrol-web
    # on a Debian 12 base container to test the "Linux-headless-specific"
    # hypothesis on an OS distinct from the host Ubuntu runner. First
    # attempt failed by setup ("No devices attached"): I installed the
    # Chromium shared libs but NOT the `chromium` binary, which patrol_cli
    # --device chrome requires. Fixed here: `chromium` is in the apt list.
    runs-on: ubuntu-latest
    container: debian:12-slim
    continue-on-error: true
    steps:
      - name: System deps + Node 22 + Flutter SDK + Chromium binary
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl git unzip xz-utils ca-certificates sudo \
            chromium \
            libnss3 libgbm1 libxshmfence1 libxkbcommon-x11-0 libatspi2.0-0 \
            libcups2 libdbus-1-3 libdrm2 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libasound2 libpangocairo-1.0-0
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v6

      - name: Flutter version
        run: flutter --version

      - name: Activate patrol_cli
        run: dart pub global activate patrol_cli

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patrol doctor
        run: patrol doctor

      - name: Run Patrol web tests
        run: |
          patrol test \
            --target patrol_test/web/ \
            --device chrome \
            --web-headless=true \
            --web-locale=es-ES \
            --web-timezone=Europe/Madrid \
            --web-browser-args='["--no-sandbox", "--disable-dev-shm-usage"]'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-debian-12
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, patrol-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
