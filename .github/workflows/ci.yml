name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    # Ampliado a `develop` para que el job `patrol-web` (EN-08-35) proteja
    # las PRs antes del merge a `develop`, no solo las promociones a
    # `main`. La PR de promoción `develop -> main` sigue cubierta porque
    # `main` está en la lista.
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Build Web
        run: flutter build web

  patrol-web:
    # EN-08-35 / ADR-024: regression gate for the three DoD scenarios
    # of EN-08-34 (OAuth web happy path first leg, orphan /callback,
    # sessionStorage disabled). Currently runs the suite under the
    # standard `flutter test` harness because `patrol_cli` 4.4 does
    # NOT discover `patrolWidgetTest` cases under `patrol test` (see
    # the "Run patrol_test/web/ suite" step). Runs in parallel with
    # `test`; both must pass before `build-docker` triggers on main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run patrol_test/web/ suite (VM widget mode)
        # The three DoD scenarios run as widget tests under the standard
        # `flutter test` harness so the suite is gated by the same path
        # used locally. The original plan was to drive them under
        # `patrol test --device chrome` (real Chromium + Playwright) but
        # the first CI run revealed that patrol_cli 4.4.0 does NOT
        # discover `patrolWidgetTest` (it only counts `patrolTest`
        # cases), producing `Total: 0` and exiting with code 1 even
        # though the underlying tests are valid. The trade-off is
        # documented in ADR-024 §"Limitaciones conocidas" and the
        # follow-up is tracked as a Patrol CLI investigation. The
        # widget-test path still exercises the real
        # KeycloakWebAuthService, the real SessionStorageGateway
        # interface and the real ProviderScope tree; the only thing it
        # does NOT exercise is the actual browser DOM (which is the
        # original goal of the Chromium run).
        run: flutter test patrol_test/web/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, patrol-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
