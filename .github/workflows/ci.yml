name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    # Ampliado a `develop` para que el job `patrol-web` (EN-08-35) proteja
    # las PRs antes del merge a `develop`, no solo las promociones a
    # `main`. La PR de promoción `develop -> main` sigue cubierta porque
    # `main` está en la lista.
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Build Web
        run: flutter build web

  patrol-web:
    # EN-08-35 / ADR-024: end-to-end web tests under real Chromium via
    # Patrol + Playwright. Runs in parallel with `test`; both must
    # pass before `build-docker` triggers on main.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Activate patrol_cli
        run: dart pub global activate patrol_cli

      - name: Install dependencies
        run: flutter pub get

      - name: Install Playwright + Chromium with Linux system deps
        # Patrol's web_runner ships package.json + playwright.config.ts but
        # `patrol test` only runs `npm install` and `npx playwright install`
        # WITHOUT --with-deps, so the headless Chromium fails silently on
        # Ubuntu runners (missing libnss3, libxshmfence1, libgbm1, etc.).
        # Pre-installing here with --with-deps puts the right .deb's on the
        # system before `patrol test` invokes the browser.
        run: npx --yes playwright@latest install --with-deps chromium

      - name: Patrol doctor
        run: patrol doctor

      - name: Run Patrol web tests
        # --no-sandbox is the standard flag for Chromium running in
        # GitHub Actions Ubuntu runners. --disable-dev-shm-usage avoids
        # the small /dev/shm allocation crashing the browser.
        run: |
          patrol test \
            --target patrol_test/web/ \
            --device chrome \
            --web-headless=true \
            --web-browser-args="--no-sandbox --disable-dev-shm-usage"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, patrol-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
