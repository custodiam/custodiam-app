name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    # Ampliado a `develop` para que el job `patrol-web` (EN-08-35) proteja
    # las PRs antes del merge a `develop`, no solo las promociones a
    # `main`. La PR de promoción `develop -> main` sigue cubierta porque
    # `main` está en la lista.
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --coverage

      - name: Build Web
        run: flutter build web

  patrol-web:
    # EN-08-35 / ADR-024: end-to-end web tests under real Chromium via
    # Patrol + Playwright. Runs in parallel with `test`; both must
    # pass before `build-docker` triggers on main.
    #
    # DIAGNOSTIC MATRIX (issue #40): probing whether the patrol-web hang
    # is specific to `ubuntu-latest`. Three runners tested in parallel:
    # ubuntu-latest (control), ubuntu-22.04 (older LTS image), and
    # windows-latest (where we verified manually that the tests pass
    # green in 37s — see issue #40 comments). If only ubuntu-latest
    # hangs, the fix is to pin the runner to a different OS.
    #
    # `continue-on-error: true` stays per matrix entry because we want
    # the workflow to proceed even if one of the variants hangs again.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Activate patrol_cli
        shell: bash
        run: dart pub global activate patrol_cli

      - name: Install dependencies
        shell: bash
        run: flutter pub get

      - name: Install Chromium system dependencies for Playwright (Linux only)
        # `patrol_cli` 4.4 hardcodes `npx playwright install` (no --with-deps)
        # inside its web_runner/, so the Chromium binary it downloads can't
        # find the OS libraries it needs on a vanilla Ubuntu runner (libnss3,
        # libxshmfence1, libgbm1, libxkbcommon-x11-0, libatspi2.0-0, ...).
        # Windows runners ship a different Chromium dependency model so the
        # step is skipped there.
        if: runner.os == 'Linux'
        run: sudo npx --yes playwright@latest install-deps chromium

      - name: Patrol doctor
        shell: bash
        run: patrol doctor

      - name: Run Patrol web tests
        # --web-browser-args expects a JSON array of strings.
        shell: bash
        run: |
          patrol test \
            --target patrol_test/web/ \
            --device chrome \
            --web-headless=true \
            --web-locale=es-ES \
            --web-timezone=Europe/Madrid \
            --web-browser-args='["--no-sandbox", "--disable-dev-shm-usage"]'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  patrol-web-debian:
    # DIAGNOSTIC (issue #40): same probe as the matrix above but inside a
    # Debian 12 (bookworm) container running on the GitHub ubuntu-latest
    # runner. If ubuntu-latest hangs and Debian passes, the fix points to
    # the Ubuntu image distribution rather than the runner kernel/network.
    runs-on: ubuntu-latest
    container: debian:12-slim
    continue-on-error: true
    steps:
      - name: Install system deps + Node 22 + Flutter SDK
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            curl git unzip xz-utils ca-certificates sudo \
            libnss3 libgbm1 libxshmfence1 libxkbcommon-x11-0 libatspi2.0-0 \
            libcups2 libdbus-1-3 libdrm2 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libasound2 libpangocairo-1.0-0
          curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
          apt-get install -y nodejs
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v6

      - name: Verify Flutter
        run: flutter --version

      - name: Activate patrol_cli
        run: dart pub global activate patrol_cli

      - name: Install dependencies
        run: flutter pub get

      - name: Install Chromium system dependencies for Playwright
        run: npx --yes playwright@latest install-deps chromium

      - name: Patrol doctor
        run: patrol doctor

      - name: Run Patrol web tests
        run: |
          patrol test \
            --target patrol_test/web/ \
            --device chrome \
            --web-headless=true \
            --web-locale=es-ES \
            --web-timezone=Europe/Madrid \
            --web-browser-args='["--no-sandbox", "--disable-dev-shm-usage"]'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-debian-12
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  build-docker:
    runs-on: ubuntu-latest
    needs: [test, patrol-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
